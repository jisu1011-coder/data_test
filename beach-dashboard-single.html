<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>전국 해수욕장 이용객 현황 대시보드</title>
    <style>
:root {
  --ink: #18211f;
  --muted: #5f6b68;
  --line: #d6ded9;
  --page: #f5f7f2;
  --panel: #ffffff;
  --deep: #12302d;
  --teal: #0f7c78;
  --blue: #386cb0;
  --coral: #d65f45;
  --gold: #ad7c18;
  --green: #2f855a;
  --violet: #7357a6;
  --warn-bg: #fff3dc;
  --warn-line: #d59b2d;
}

* {
  box-sizing: border-box;
}

html {
  min-width: 320px;
}

body {
  margin: 0;
  background: var(--page);
  color: var(--ink);
  font-family: "Segoe UI", "Noto Sans KR", Arial, sans-serif;
  letter-spacing: 0;
}

button,
input,
select {
  font: inherit;
}

.site-shell {
  width: min(1440px, 100%);
  margin: 0 auto;
  padding: 24px;
}

.page-header {
  display: flex;
  min-height: 150px;
  align-items: end;
  justify-content: space-between;
  gap: 24px;
  border-bottom: 4px solid var(--coral);
  background: var(--deep);
  color: #fff;
  padding: 28px;
}

.eyebrow {
  margin: 0 0 10px;
  color: #b9d2ce;
  font-size: 14px;
  font-weight: 700;
}

h1,
h2,
p {
  margin-top: 0;
}

h1 {
  max-width: 900px;
  margin-bottom: 0;
  font-size: clamp(28px, 5vw, 52px);
  line-height: 1.12;
  letter-spacing: 0;
}

h2 {
  margin-bottom: 0;
  font-size: 19px;
  line-height: 1.3;
}

.year-badge {
  display: grid;
  gap: 4px;
  min-width: 136px;
  border: 1px solid rgba(255, 255, 255, 0.25);
  border-radius: 8px;
  padding: 14px 16px;
  text-align: right;
}

.year-badge span {
  color: #b9d2ce;
  font-size: 13px;
}

.year-badge strong {
  font-size: 24px;
}

.summary-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 12px;
  margin-top: 16px;
}

.metric-card {
  min-height: 118px;
  border: 1px solid var(--line);
  border-top: 5px solid var(--teal);
  border-radius: 8px;
  background: var(--panel);
  padding: 18px;
}

.metric-card:nth-child(2) {
  border-top-color: var(--blue);
}

.metric-card:nth-child(3) {
  border-top-color: var(--gold);
}

.metric-card-accent {
  border-top-color: var(--coral);
}

.metric-label {
  display: block;
  color: var(--muted);
  font-size: 14px;
  font-weight: 700;
}

.metric-card strong {
  display: block;
  margin-top: 10px;
  font-size: clamp(28px, 4vw, 42px);
  line-height: 1;
}

.metric-card small {
  color: var(--muted);
}

.filter-band {
  display: grid;
  grid-template-columns: 1fr 1.6fr 1fr 1fr auto;
  gap: 10px;
  align-items: end;
  margin-top: 18px;
  border: 1px solid var(--line);
  background: #edf3ef;
  padding: 14px;
}

.filter-band label {
  display: grid;
  gap: 6px;
  min-width: 0;
}

.filter-band span {
  color: var(--muted);
  font-size: 13px;
  font-weight: 700;
}

select,
input,
.filter-band button {
  width: 100%;
  min-height: 42px;
  border: 1px solid #bcc8c3;
  border-radius: 6px;
  background: #fff;
  color: var(--ink);
  padding: 8px 10px;
}

.filter-band button {
  cursor: pointer;
  border-color: var(--deep);
  background: var(--deep);
  color: #fff;
  font-weight: 700;
}

.chart-layout {
  display: grid;
  grid-template-columns: minmax(0, 1.3fr) minmax(320px, 0.85fr);
  gap: 16px;
  margin-top: 18px;
}

.panel {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--panel);
  padding: 18px;
}

.panel-wide {
  grid-row: span 2;
}

.panel-heading,
.table-heading {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 14px;
  margin-bottom: 14px;
}

.panel-heading span,
.table-heading p,
.hotspot-note {
  color: var(--muted);
  font-size: 13px;
  font-weight: 700;
}

.chart-list {
  display: grid;
  gap: 10px;
}

.chart-list.compact {
  gap: 8px;
}

.chart-row {
  display: grid;
  grid-template-columns: minmax(116px, 0.44fr) minmax(120px, 1fr);
  gap: 12px;
  align-items: center;
  min-height: 38px;
}

.chart-list.compact .chart-row {
  grid-template-columns: minmax(108px, 0.52fr) minmax(110px, 1fr);
}

.chart-label {
  min-width: 0;
}

.chart-label strong,
.chart-label span {
  display: block;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.chart-label strong {
  font-size: 14px;
}

.chart-label span {
  color: var(--muted);
  font-size: 12px;
}

.bar-track {
  position: relative;
  height: 30px;
  overflow: hidden;
  border-radius: 6px;
  background: #e7ece8;
}

.bar-fill {
  display: flex;
  width: 0;
  min-width: 3px;
  height: 100%;
  align-items: center;
  justify-content: flex-end;
  color: #fff;
  font-size: 12px;
  font-weight: 800;
  line-height: 1;
  padding-right: 8px;
  transition: width 0.25s ease;
}

.bar-value-outside {
  position: absolute;
  top: 50%;
  right: 8px;
  color: var(--ink);
  font-size: 12px;
  font-weight: 800;
  transform: translateY(-50%);
}

.table-section {
  margin-top: 18px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--panel);
  padding: 18px;
}

.table-wrap {
  overflow: auto;
  border: 1px solid var(--line);
}

table {
  width: 100%;
  min-width: 760px;
  border-collapse: collapse;
}

th,
td {
  border-bottom: 1px solid var(--line);
  padding: 11px 12px;
  text-align: left;
  vertical-align: middle;
}

th {
  position: sticky;
  top: 0;
  z-index: 1;
  background: #eef4f0;
  color: #24312e;
  font-size: 13px;
}

th button {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  border: 0;
  background: transparent;
  color: inherit;
  cursor: pointer;
  font-weight: 800;
  padding: 0;
  text-align: left;
}

th button::after {
  content: "↕";
  color: #71807c;
  font-size: 12px;
}

th button.active.asc::after {
  content: "↑";
  color: var(--coral);
}

th button.active.desc::after {
  content: "↓";
  color: var(--coral);
}

tbody tr:nth-child(even) {
  background: #fafbf8;
}

tbody tr.hotspot {
  background: var(--warn-bg);
  box-shadow: inset 4px 0 0 var(--warn-line);
}

.number-cell {
  text-align: right;
  white-space: nowrap;
}

.city-chip {
  display: inline-flex;
  max-width: 100%;
  align-items: center;
  border-radius: 6px;
  background: #eef1eb;
  padding: 3px 7px;
  font-size: 12px;
  font-weight: 800;
}

tr.hotspot .city-chip {
  background: #ffe0a6;
}

.empty-state {
  color: var(--muted);
  text-align: center;
}

@media (max-width: 980px) {
  .summary-grid,
  .chart-layout,
  .filter-band {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .panel-wide {
    grid-row: auto;
  }
}

@media (max-width: 680px) {
  .site-shell {
    padding: 12px;
  }

  .page-header,
  .panel-heading,
  .table-heading {
    align-items: stretch;
    flex-direction: column;
  }

  .page-header {
    min-height: 0;
    padding: 20px;
  }

  .year-badge {
    text-align: left;
  }

  .summary-grid,
  .filter-band,
  .chart-layout {
    grid-template-columns: 1fr;
  }

  .chart-row,
  .chart-list.compact .chart-row {
    grid-template-columns: 1fr;
    gap: 5px;
  }
}

  els.searchInput.addEventListener("input", (event) => {
    state.query = event.target.value.trim();

    state.maxVisitors = event.target.value;

  });

  els.resetFilters.addEventListener("click", () => {
    state.province = "all";
    state.query = "";
    state.minVisitors = "";
    state.maxVisitors = "";

    els.maxVisitors.value = "";
    render();
  });

  els.sortButtons.forEach((button) => {
    button.addEventListener("click", () => {
      const nextKey = button.dataset.sort;
      if (state.sortKey === nextKey) {
        state.sortDir = state.sortDir === "asc" ? "desc" : "asc";
      } else {
        state.sortKey = nextKey;
        state.sortDir = nextKey === "visitors" ? "desc" : "asc";
      }
      renderTable(getFilteredRows());
      syncSortButtons();
    });
  });
}

async function loadData() {
  try {
    const csv = await readCsv();
    state.rows = normalizeRows(parseCsv(csv));
    populateProvinceFilter();
    setRangeHints();
    render();
  } catch (error) {
    els.tableBody.innerHTML = `<tr><td colspan="5" class="empty-state">${escapeHtml(error.message)}</td></tr>`;
  }
}

async function readCsv() {
  try {
    const response = await fetch("./data.csv", { cache: "no-store" });
    if (!response.ok) throw new Error(`CSV 요청 실패: ${response.status}`);
    return await response.text();
  } catch (error) {
    if (typeof window.BEACH_CSV === "string" && window.BEACH_CSV.length > 0) {
      return window.BEACH_CSV;
    }
    throw error;
  }
}

function parseCsv(text) {
  const rows = [];
  let row = [];
  let field = "";
  let quoted = false;

  for (let index = 0; index < text.length; index += 1) {
    const char = text[index];
    const next = text[index + 1];

    if (char === '"' && quoted && next === '"') {
      field += '"';
      index += 1;
    } else if (char === '"') {
      quoted = !quoted;
    } else if (char === "," && !quoted) {
      row.push(field);
      field = "";
    } else if ((char === "\n" || char === "\r") && !quoted) {
      if (char === "\r" && next === "\n") index += 1;
      row.push(field);
      if (row.some((cell) => cell.trim() !== "")) rows.push(row);
      row = [];
      field = "";
    } else {
      field += char;
    }
  }

  row.push(field);
  if (row.some((cell) => cell.trim() !== "")) rows.push(row);

  const headers = rows.shift().map((header) => header.replace(/^\uFEFF/, "").trim());
  return rows.map((cells) => {
    const record = {};
    headers.forEach((header, index) => {
      record[header] = (cells[index] ?? "").trim();
    });
    return record;
  });
}

function normalizeRows(records) {
  return records
    .map((record) => ({
      province: cleanText(record["시도"]),
      city: cleanText(record["시군구"]),
      beach: cleanText(record["해수욕장명"]),
      visitors: cleanNumber(record["2023년"])
    }))
    .filter((row) => row.province && row.city && row.beach);
}

function cleanText(value) {
  return String(value ?? "").replace(/\s+/g, " ").trim();
}

function cleanNumber(value) {
  const parsed = Number(String(value ?? "").replace(/[^\d.-]/g, ""));
  return Number.isFinite(parsed) ? parsed : 0;
}

function populateProvinceFilter() {
  const provinces = [...new Set(state.rows.map((row) => row.province))].sort((a, b) => a.localeCompare(b, "ko"));

  els.provinceFilter.insertAdjacentHTML("beforeend", options.join(""));
}

function setRangeHints() {
  const visitors = state.rows.map((row) => row.visitors);

function render() {
  const filtered = getFilteredRows();

  state.hotspotCities = new Set(cityTotals.filter((item) => item.value >= 1000000).map((item) => item.key));

  renderSummary(filtered, cityTotals);
  renderCharts(filtered);
  renderTable(filtered);
  syncSortButtons();
}

function getFilteredRows() {
  const query = state.query.toLocaleLowerCase("ko-KR");
  const min = state.minVisitors === "" ? null : Number(state.minVisitors);
  const max = state.maxVisitors === "" ? null : Number(state.maxVisitors);

  return state.rows.filter((row) => {
    const matchesProvince = state.province === "all" || row.province === state.province;
    const matchesQuery = !query || row.beach.toLocaleLowerCase("ko-KR").includes(query);
    const matchesMin = min === null || row.visitors >= min;
    const matchesMax = max === null || row.visitors <= max;
    return matchesProvince && matchesQuery && matchesMin && matchesMax;
  });
}

function renderSummary(rows, cityTotals) {
  const totalVisitors = rows.reduce((sum, row) => sum + row.visitors, 0);

  const hotCityCount = cityTotals.filter((item) => item.value >= 1000000).length;

  els.totalVisitors.textContent = numberFormat.format(totalVisitors);
  els.totalBeaches.textContent = numberFormat.format(rows.length);
  els.totalProvinces.textContent = numberFormat.format(provinceCount);
  els.hotCityCount.textContent = numberFormat.format(hotCityCount);
  els.resultStatus.textContent = `표시 ${numberFormat.format(rows.length)}곳 / 전체 ${numberFormat.format(state.rows.length)}곳`;
  els.visitorChartTotal.textContent = `${numberFormat.format(totalVisitors)}명`;
}

function renderCharts(rows) {
  const provinceVisitors = groupSum(rows, (row) => row.province).sort((a, b) => b.value - a.value);
  const provinceCounts = groupCount(rows, (row) => row.province).sort((a, b) => b.value - a.value);
  const topBeaches = [...rows]
    .sort((a, b) => b.visitors - a.visitors)
    .slice(0, 10)
    .map((row) => ({
      key: row.beach,
      detail: `${row.province} ${row.city}`,
      value: row.visitors
    }));

  renderBarList(els.provinceVisitorChart, provinceVisitors, { unit: "명", empty: "표시할 시도 데이터가 없습니다." });
  renderBarList(els.topBeachChart, topBeaches, { unit: "명", empty: "표시할 해수욕장 데이터가 없습니다." });
  renderBarList(els.provinceCountChart, provinceCounts, { unit: "곳", empty: "표시할 해수욕장 수 데이터가 없습니다." });
}

function renderBarList(container, data, options) {
  if (data.length === 0) {
    container.innerHTML = `<p class="empty-state">${options.empty}</p>`;
    return;
  }

  const max = Math.max(...data.map((item) => item.value), 1);
  container.innerHTML = data
    .map((item, index) => {
      const percent = Math.max((item.value / max) * 100, 2);
      const value = `${numberFormat.format(item.value)}${options.unit}`;
      const color = colors[index % colors.length];
      const outside = percent < 22 ? `<span class="bar-value-outside">${value}</span>` : "";
      const detail = item.detail ? `<span>${escapeHtml(item.detail)}</span>` : "";
      return `
        <div class="chart-row">
          <div class="chart-label">
            <strong title="${escapeHtml(item.key)}">${escapeHtml(item.key)}</strong>
            ${detail}
          </div>
          <div class="bar-track" aria-label="${escapeHtml(item.key)} ${value}">
            <div class="bar-fill" style="width: ${percent.toFixed(2)}%; background: ${color};">${percent >= 22 ? value : ""}</div>
            ${outside}
          </div>
        </div>
      `;
    })
    .join("");
}

function renderTable(rows) {
  const sorted = getSortedRows(rows);

  if (sorted.length === 0) {
    els.tableBody.innerHTML = `<tr><td colspan="5" class="empty-state">조건에 맞는 데이터가 없습니다.</td></tr>`;
    return;
  }

  els.tableBody.innerHTML = sorted
    .map((row, index) => {
      const cityKey = `${row.province} ${row.city}`;
      const hotspot = state.hotspotCities.has(cityKey);
      return `
        <tr class="${hotspot ? "hotspot" : ""}">
          <td>${numberFormat.format(index + 1)}</td>
          <td>${escapeHtml(row.province)}</td>
          <td><span class="city-chip">${escapeHtml(row.city)}</span></td>
          <td>${escapeHtml(row.beach)}</td>
          <td class="number-cell">${numberFormat.format(row.visitors)}</td>
        </tr>
      `;
    })
    .join("");
}

function getSortedRows(rows) {
  return [...rows].sort((a, b) => {
    const aValue = a[state.sortKey];
    const bValue = b[state.sortKey];
    const direction = state.sortDir === "asc" ? 1 : -1;

    if (typeof aValue === "number" && typeof bValue === "number") {
      return (aValue - bValue) * direction;
    }

    return String(aValue).localeCompare(String(bValue), "ko") * direction;
  });
}

function syncSortButtons() {
  els.sortButtons.forEach((button) => {
    const active = button.dataset.sort === state.sortKey;
    button.classList.toggle("active", active);
    button.classList.toggle("asc", active && state.sortDir === "asc");
    button.classList.toggle("desc", active && state.sortDir === "desc");
  });
}

function groupSum(rows, keySelector) {
  const map = new Map();
  rows.forEach((row) => {
    const key = keySelector(row);
    map.set(key, (map.get(key) ?? 0) + row.visitors);
  });
  return [...map.entries()].map(([key, value]) => ({ key, value }));
}

function groupCount(rows, keySelector) {
  const map = new Map();
  rows.forEach((row) => {
    const key = keySelector(row);
    map.set(key, (map.get(key) ?? 0) + 1);
  });
  return [...map.entries()].map(([key, value]) => ({ key, value }));
}

function escapeHtml(value) {
  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

    </script>

    <main class="site-shell">
      <header class="page-header">

      <section class="summary-grid" aria-label="요약">
        <article class="metric-card">
          <span class="metric-label">총 이용객</span>
          <strong id="totalVisitors">-</strong>
          <small>명</small>
        </article>
        <article class="metric-card">
          <span class="metric-label">해수욕장 수</span>
          <strong id="totalBeaches">-</strong>
          <small>곳</small>
        </article>
        <article class="metric-card">
          <span class="metric-label">시도 수</span>
          <strong id="totalProvinces">-</strong>
          <small>개</small>
        </article>
        <article class="metric-card metric-card-accent">
          <span class="metric-label">100만 명 이상 시군구</span>
          <strong id="hotCityCount">-</strong>
          <small>개</small>
        </article>
      </section>

      <section class="filter-band" aria-label="검색과 필터">
        <label>
          <span>시도</span>
          <select id="provinceFilter">
            <option value="all">전체</option>
          </select>
        </label>
        <label class="search-field">
          <span>해수욕장명</span>
          <input id="searchInput" type="search" placeholder="예: 경포대" autocomplete="off" />
        </label>
        <label>
          <span>최소 이용객</span>
          <input id="minVisitors" type="number" min="0" inputmode="numeric" />
        </label>
        <label>
          <span>최대 이용객</span>
          <input id="maxVisitors" type="number" min="0" inputmode="numeric" />
        </label>
        <button id="resetFilters" type="button">초기화</button>
      </section>

      <section class="chart-layout" aria-label="시각화">
        <article class="panel panel-wide">
          <div class="panel-heading">
            <h2>시도별 이용객 수</h2>
            <span id="visitorChartTotal">-</span>
          </div>
          <div id="provinceVisitorChart" class="chart-list"></div>
        </article>

        <article class="panel">
          <div class="panel-heading">
            <h2>상위 10개 해수욕장</h2>
            <span>이용객 순</span>
          </div>
          <div id="topBeachChart" class="chart-list compact"></div>
        </article>

        <article class="panel">
          <div class="panel-heading">
            <h2>시도별 해수욕장 수</h2>
            <span>등록 개수</span>
          </div>
          <div id="provinceCountChart" class="chart-list compact"></div>
        </article>
      </section>

      <section class="table-section">
        <div class="table-heading">
          <div>
            <h2>데이터 표</h2>
            <p id="resultStatus" aria-live="polite">-</p>
          </div>
          <span class="hotspot-note">진한 표시: 100만 명 이상 시군구</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th scope="col">순번</th>
                <th scope="col"><button type="button" data-sort="province">시도</button></th>
                <th scope="col"><button type="button" data-sort="city">시군구</button></th>
                <th scope="col"><button type="button" data-sort="beach">해수욕장명</button></th>
                <th scope="col" class="number-cell"><button type="button" data-sort="visitors">2023년 이용객 수</button></th>
              </tr>
            </thead>
            <tbody id="dataTableBody">
              <tr>
                <td colspan="5">데이터를 불러오는 중입니다.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
