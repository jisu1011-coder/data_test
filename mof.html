<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>해양수산 KPI 대시보드</title>
    <style>
:root {
  --primary: #e60023;
  --primary-pressed: #cc001f;
  --ink: #000000;
  --ink-soft: #211922;
  --body: #33332e;
  --charcoal: #262622;
  --mute: #62625b;
  --ash: #91918c;
  --stone: #c8c8c1;
  --hairline: #dadad3;
  --hairline-soft: #e5e5e0;
  --canvas: #ffffff;
  --surface-soft: #fbfbf9;
  --surface-card: #f6f6f3;
  --secondary-bg: #e5e5e0;
  --surface-dark: #262622;
  --success-deep: #103c25;
  --success-pale: #c7f0da;
  --error: #9e0a0a;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  background: var(--surface-soft);
  color: var(--ink);
  font-family:
    Inter, "Segoe UI", "Malgun Gothic", AppleSDGothicNeo, Arial, sans-serif;
}

.dashboard-shell {
  width: min(1280px, calc(100% - 48px));
  margin: 0 auto;
  padding: 0 0 40px;
}

.topbar {
  position: sticky;
  top: 0;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: space-between;
  min-height: 72px;
  gap: 24px;
  margin-bottom: 24px;
  padding: 12px 0 14px;
  border-bottom: 1px solid var(--hairline-soft);
  background: rgba(251, 251, 249, 0.94);
  backdrop-filter: blur(14px);
}

.topbar > div:first-child {
  position: relative;
  display: grid;
  gap: 2px;
  padding-left: 18px;
}

.topbar > div:first-child::before {
  position: absolute;
  top: 5px;
  left: 0;
  width: 10px;
  height: 10px;
  border-radius: 9999px;
  background: var(--primary);
  content: "";
}

.eyebrow,
.panel-kicker {
  margin: 0;
  color: var(--mute);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0;
  text-transform: uppercase;
}

h1,
h2 {
  margin: 0;
  letter-spacing: 0;
}

h1 {
  color: var(--ink);
  font-size: 44px;
  font-weight: 700;
  line-height: 1.04;
}

h2 {
  color: var(--ink);
  font-size: 28px;
  font-weight: 700;
  line-height: 1.18;
}

.source-panel {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: min(420px, 38vw);
  min-height: 48px;
  gap: 16px;
  padding: 7px 8px 7px 18px;
  border: 0;
  border-radius: 9999px;
  background: var(--surface-card);
  color: var(--ink);
  text-align: left;
}

.source-panel span,
.source-panel strong {
  display: block;
  white-space: nowrap;
}

.source-panel span {
  overflow: hidden;
  color: var(--mute);
  font-size: 14px;
  font-weight: 600;
  text-overflow: ellipsis;
}

.source-panel strong {
  padding: 10px 14px;
  border-radius: 9999px;
  background: var(--canvas);
  color: var(--ink);
  font-size: 12px;
  font-weight: 700;
}

.kpi-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  align-items: start;
  gap: 8px;
  margin-bottom: 8px;
}

.kpi-card,
.panel {
  border: 0;
  background: var(--surface-card);
  box-shadow: none;
}

.kpi-card {
  position: relative;
  min-height: 214px;
  overflow: hidden;
  padding: 24px;
  border-radius: 16px;
  transition:
    background-color 160ms ease,
    color 160ms ease;
}

.kpi-card::before {
  position: absolute;
  top: 16px;
  right: 16px;
  width: 42px;
  height: 16px;
  border-radius: 9999px;
  background: var(--canvas);
  content: "";
  transition: background-color 160ms ease;
}

.kpi-card span,
.kpi-card small {
  display: block;
  color: var(--mute);
  transition: color 160ms ease;
}

.kpi-card span {
  max-width: calc(100% - 52px);
  font-size: 16px;
  font-weight: 700;
  line-height: 1.25;
}

.kpi-card strong {
  display: block;
  margin: 46px 0 14px;
  color: var(--ink);
  font-size: 34px;
  font-weight: 700;
  line-height: 1;
  transition: color 160ms ease;
}

.kpi-card small {
  font-size: 12px;
  font-weight: 500;
  line-height: 1.4;
}

.kpi-export {
  min-height: 264px;
  margin-top: 28px;
}

.kpi-satisfaction {
  min-height: 188px;
}

.kpi-incident {
  min-height: 236px;
  margin-top: 16px;
}

.kpi-catch::before,
.kpi-export::before,
.kpi-satisfaction::before,
.kpi-incident::before {
  background: var(--canvas);
}

.kpi-card:hover {
  background: var(--surface-dark);
}

.kpi-card:hover::before {
  background: var(--primary);
}

.kpi-card:hover span,
.kpi-card:hover small {
  color: rgba(255, 255, 255, 0.72);
}

.kpi-card:hover strong {
  color: var(--canvas);
}

.analytics-grid {
  display: grid;
  grid-template-columns: minmax(0, 1.35fr) minmax(320px, 0.65fr);
  align-items: start;
  gap: 8px;
}

.panel {
  min-width: 0;
  padding: 24px;
  border-radius: 16px;
}

.panel-wide {
  grid-row: span 2;
  min-height: 548px;
  padding: 32px;
  border-radius: 32px;
  background: var(--canvas);
}

.panel-heading {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 20px;
}

.panel-kicker {
  margin-bottom: 6px;
}

.metric-chip {
  display: inline-flex;
  align-items: center;
  min-height: 40px;
  padding: 6px 14px;
  border-radius: 16px;
  background: var(--primary);
  color: var(--canvas);
  font-size: 14px;
  font-weight: 700;
  line-height: 1;
  white-space: nowrap;
}

.chart-box {
  width: 100%;
  height: 420px;
  min-height: 360px;
  overflow: hidden;
  border-radius: 16px;
  background: var(--surface-card);
}

.chart-box svg {
  display: block;
  width: 100%;
  height: 100%;
}

.axis-label {
  fill: var(--mute);
  font-size: 12px;
  font-weight: 500;
}

.grid-line {
  stroke: var(--hairline);
  stroke-width: 1;
}

.line-path {
  fill: none;
  stroke: var(--primary);
  stroke-linecap: round;
  stroke-linejoin: round;
  stroke-width: 5;
}

.area-path {
  fill: rgba(230, 0, 35, 0.07);
}

.data-dot {
  fill: var(--canvas);
  stroke: var(--primary);
  stroke-width: 3;
}

.bar-list,
.risk-list {
  display: grid;
  gap: 0;
}

.rank-row,
.risk-row {
  display: grid;
  gap: 10px;
  padding: 14px 0;
  border-bottom: 1px solid var(--hairline-soft);
}

.rank-row:first-child,
.risk-row:first-child {
  padding-top: 0;
}

.rank-row:last-child,
.risk-row:last-child {
  padding-bottom: 0;
  border-bottom: 0;
}

.rank-meta,
.risk-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  color: var(--mute);
  font-size: 14px;
}

.rank-name,
.risk-name {
  display: inline-flex;
  align-items: center;
  min-width: 0;
  color: var(--ink);
  font-weight: 700;
}

.rank-number {
  display: inline-grid;
  width: 32px;
  height: 32px;
  margin-right: 10px;
  border-radius: 9999px;
  place-items: center;
  background: var(--canvas);
  color: var(--ink);
  font-size: 12px;
  font-weight: 700;
}

.bar-track {
  position: relative;
  height: 16px;
  overflow: hidden;
  border-radius: 9999px;
  background: var(--secondary-bg);
}

.bar-fill {
  height: 100%;
  min-width: 4px;
  border-radius: inherit;
  transform-origin: left center;
  animation: growBar 680ms ease-out both;
}

.rank-row:nth-child(1) .bar-fill {
  background: var(--primary);
}

.rank-row:nth-child(2) .bar-fill {
  background: var(--ink);
}

.rank-row:nth-child(3) .bar-fill {
  background: var(--charcoal);
}

.rank-row:nth-child(4) .bar-fill {
  background: var(--mute);
}

.rank-row:nth-child(5) .bar-fill {
  background: var(--ash);
}

.risk-row .bar-track {
  height: 20px;
}

.risk-low .bar-track {
  background: var(--success-pale);
}

.risk-low .bar-fill {
  background: var(--success-deep);
}

.risk-medium .bar-fill {
  background: var(--charcoal);
}

.risk-high .bar-fill {
  background: var(--primary);
}

.error-state {
  display: grid;
  min-height: 280px;
  place-items: center;
  border: 1px solid var(--hairline);
  border-radius: 16px;
  color: var(--error);
  font-weight: 700;
  text-align: center;
}

@keyframes growBar {
  from {
    transform: scaleX(0);
  }
  to {
    transform: scaleX(1);
  }
}

@media (max-width: 1060px) {
  .kpi-grid,
  .analytics-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .panel-wide {
    grid-column: 1 / -1;
    grid-row: auto;
  }

  .kpi-export,
  .kpi-incident {
    margin-top: 0;
  }
}

@media (max-width: 720px) {
  .dashboard-shell {
    width: min(100% - 24px, 640px);
  }

  .topbar,
  .panel-heading {
    align-items: stretch;
    flex-direction: column;
  }

  .topbar {
    position: static;
    min-height: auto;
    padding-top: 18px;
  }

  h1 {
    font-size: 36px;
  }

  h2 {
    font-size: 22px;
  }

  .source-panel {
    width: 100%;
  }

  .kpi-grid,
  .analytics-grid {
    grid-template-columns: 1fr;
  }

  .kpi-card,
  .kpi-export,
  .kpi-satisfaction,
  .kpi-incident {
    min-height: 178px;
    margin-top: 0;
  }

  .panel,
  .panel-wide {
    padding: 20px;
    border-radius: 16px;
  }

  .panel-wide {
    min-height: auto;
  }

  .chart-box {
    height: 340px;
    min-height: 320px;
  }

  .metric-chip {
    width: fit-content;
  }
}

    </style>
  </head>

    <div class="dashboard-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Ocean Fisheries Dashboard</p>
          <h1>해양수산 운영 KPI</h1>
        </div>
        <div class="source-panel">
          <span id="recordCount">데이터 로딩 중</span>
          <strong id="dateRange">-</strong>
        </div>
      </header>

      <main>
        <section class="kpi-grid" aria-label="주요 KPI">
          <article class="kpi-card kpi-catch">
            <span>총 어획량</span>
            <strong id="totalCatch">-</strong>
            <small>전 기간 합계</small>
          </article>
          <article class="kpi-card kpi-export">
            <span>총 수출액</span>
            <strong id="totalExport">-</strong>
            <small>전 기간 합계</small>
          </article>
          <article class="kpi-card kpi-satisfaction">

            <strong id="avgSatisfaction">-</strong>
            <small>전체 데이터 평균</small>
          </article>
          <article class="kpi-card kpi-incident">
            <span>총 안전사고 건수</span>
            <strong id="totalIncidents">-</strong>
            <small>전 기간 합계</small>
          </article>
        </section>

        <section class="analytics-grid">
          <article class="panel panel-wide">
            <div class="panel-heading">
              <div>
                <p class="panel-kicker">Trend</p>
                <h2>월별 수출액 추이</h2>
              </div>
              <span id="trendPeak" class="metric-chip">-</span>
            </div>
            <div id="monthlyChart" class="chart-box" aria-label="월별 수출액 추이 차트"></div>
          </article>

          <article class="panel">
            <div class="panel-heading">
              <div>
                <p class="panel-kicker">Auction</p>
                <h2>항만별 위판금액 TOP 5</h2>
              </div>
            </div>
            <div id="portTop5" class="bar-list" aria-label="항만별 위판금액 상위 5개"></div>
          </article>

          <article class="panel">
            <div class="panel-heading">
              <div>
                <p class="panel-kicker">Safety</p>
                <h2>기상위험도별 사고 건수 비교</h2>
              </div>
            </div>
            <div id="riskComparison" class="risk-list" aria-label="기상위험도별 안전사고 건수"></div>
          </article>
        </section>
      </main>
    </div>

    <script>
const DASHBOARD_ROWS = JSON.parse(document.getElementById("dashboard-data").textContent);
const DATA_PATH = "data/ocean_fisheries_sample_300_cp949.csv";

const formatNumber = (value, digits = 0) =>
  new Intl.NumberFormat("ko-KR", {
    minimumFractionDigits: digits,
    maximumFractionDigits: digits,
  }).format(value);

const formatCurrency = (value) =>
  `US$ ${new Intl.NumberFormat("ko-KR", {
    maximumFractionDigits: 0,
  }).format(value)}`;

const formatCurrencyShort = (value) => {
  if (value >= 1_000_000) return `US$ ${(value / 1_000_000).toFixed(2)}M`;
  if (value >= 1_000) return `US$ ${(value / 1_000).toFixed(0)}K`;
  return formatCurrency(value);
};

const toNumber = (value) => {
  const parsed = Number.parseFloat(String(value ?? "").replaceAll(",", ""));
  return Number.isFinite(parsed) ? parsed : 0;
};

const toOptionalNumber = (value) => {
  const parsed = Number.parseFloat(String(value ?? "").replaceAll(",", ""));
  return Number.isFinite(parsed) ? parsed : null;
};

function parseCsv(text) {
  const rows = [];
  let row = [];
  let field = "";
  let inQuotes = false;

  const pushField = () => {
    row.push(field);
    field = "";
  };

  const pushRow = () => {
    if (row.length || field) {
      pushField();
      rows.push(row);
    }
    row = [];
  };

  for (let i = 0; i < text.length; i += 1) {
    const char = text[i];
    const next = text[i + 1];

    if (char === '"') {
      if (inQuotes && next === '"') {
        field += '"';
        i += 1;
      } else {
        inQuotes = !inQuotes;
      }
      continue;
    }

    if (char === "," && !inQuotes) {
      pushField();
      continue;
    }

    if ((char === "\n" || char === "\r") && !inQuotes) {
      if (char === "\r" && next === "\n") i += 1;
      pushRow();
      continue;
    }

    field += char;
  }

  if (field || row.length) pushRow();

  const headers = rows.shift().map((header) => header.replace(/^\uFEFF/, ""));
  return rows
    .filter((values) => values.some((value) => value.trim() !== ""))
    .map((values) =>
      Object.fromEntries(headers.map((header, index) => [header, values[index] ?? ""]))
    );
}

async function loadData() {
  return DASHBOARD_ROWS;
}

function aggregate(rows) {
  const portTotals = new Map();
  const monthTotals = new Map();
  const riskTotals = new Map();

  const totals = rows.reduce(
    (acc, row) => {
      const catchTons = toNumber(row.catch_tons);
      const exportValue = toNumber(row.export_value_usd);
      const landingValue = toNumber(row.landing_value_usd);
      const incidents = toNumber(row.safety_incident_count);
      const satisfaction = toOptionalNumber(row.public_satisfaction_score);
      const port = row.port_ko || row.port_en || "미상";
      const month = `${String(row.year).padStart(4, "0")}-${String(row.month).padStart(2, "0")}`;
      const risk = row.weather_risk_level || "Unknown";

      acc.catchTons += catchTons;
      acc.exportValue += exportValue;
      acc.incidents += incidents;
      if (satisfaction !== null) {
        acc.satisfaction += satisfaction;
        acc.satisfactionCount += 1;
      }

      portTotals.set(port, (portTotals.get(port) ?? 0) + landingValue);
      monthTotals.set(month, (monthTotals.get(month) ?? 0) + exportValue);
      riskTotals.set(risk, (riskTotals.get(risk) ?? 0) + incidents);

      return acc;
    },
    {
      catchTons: 0,
      exportValue: 0,
      incidents: 0,
      satisfaction: 0,
      satisfactionCount: 0,
    }
  );

  const dates = rows.map((row) => row.date).filter(Boolean).sort();
  const portTop5 = [...portTotals.entries()]
    .sort((a, b) => b[1] - a[1])
    .slice(0, 5)
    .map(([label, value]) => ({ label, value }));
  const monthly = [...monthTotals.entries()]
    .sort(([a], [b]) => a.localeCompare(b))
    .map(([label, value]) => ({ label, value }));
  const riskOrder = ["Low", "Medium", "High"];
  const risk = riskOrder
    .filter((level) => riskTotals.has(level))
    .map((level) => ({ label: level, value: riskTotals.get(level) }));

  return {
    rowCount: rows.length,
    dateRange: dates.length ? `${dates.at(0)} ~ ${dates.at(-1)}` : "-",
    catchTons: totals.catchTons,
    exportValue: totals.exportValue,
    avgSatisfaction: totals.satisfaction / Math.max(1, totals.satisfactionCount),
    incidents: totals.incidents,
    portTop5,
    monthly,
    risk,
  };
}

function setText(id, text) {
  document.getElementById(id).textContent = text;
}

function renderKpis(data) {
  setText("recordCount", `${formatNumber(data.rowCount)}건 데이터`);
  setText("dateRange", data.dateRange);
  setText("totalCatch", `${formatNumber(data.catchTons, 1)} t`);
  setText("totalExport", formatCurrency(data.exportValue));
  setText("avgSatisfaction", `${formatNumber(data.avgSatisfaction, 1)}점`);
  setText("totalIncidents", `${formatNumber(data.incidents)}건`);

  const peak = data.monthly.reduce((best, item) => (item.value > best.value ? item : best), {
    label: "-",
    value: 0,
  });
  setText("trendPeak", `최고 ${peak.label} · ${formatCurrencyShort(peak.value)}`);
}

function renderBars(containerId, items) {
  const container = document.getElementById(containerId);
  const max = Math.max(...items.map((item) => item.value), 1);
  container.innerHTML = items
    .map(
      (item, index) => `
        <div class="rank-row">
          <div class="rank-meta">
            <span class="rank-name"><span class="rank-number">${index + 1}</span>${item.label}</span>
            <strong>${formatCurrency(item.value)}</strong>
          </div>
          <div class="bar-track" aria-hidden="true">
            <div class="bar-fill" style="width: ${(item.value / max) * 100}%"></div>
          </div>
        </div>
      `
    )
    .join("");
}

function renderRisks(items) {
  const container = document.getElementById("riskComparison");
  const labelMap = {
    Low: "낮음",
    Medium: "보통",
    High: "높음",
  };
  const classMap = {
    Low: "risk-low",
    Medium: "risk-medium",
    High: "risk-high",
  };
  const max = Math.max(...items.map((item) => item.value), 1);
  container.innerHTML = items
    .map(
      (item) => `
        <div class="risk-row ${classMap[item.label] ?? ""}">
          <div class="risk-meta">
            <span class="risk-name">${labelMap[item.label] ?? item.label}</span>
            <strong>${formatNumber(item.value)}건</strong>
          </div>
          <div class="bar-track" aria-hidden="true">
            <div class="bar-fill" style="width: ${(item.value / max) * 100}%"></div>
          </div>
        </div>
      `
    )
    .join("");
}

function createSvgElement(name, attributes = {}) {
  const element = document.createElementNS("http://www.w3.org/2000/svg", name);
  Object.entries(attributes).forEach(([key, value]) => element.setAttribute(key, value));
  return element;
}

function renderLineChart(items) {
  const container = document.getElementById("monthlyChart");
  container.innerHTML = "";

  const width = 820;
  const height = 430;
  const margin = { top: 22, right: 24, bottom: 48, left: 74 };
  const plotWidth = width - margin.left - margin.right;
  const plotHeight = height - margin.top - margin.bottom;
  const maxValue = Math.max(...items.map((item) => item.value), 1) * 1.14;
  const minValue = 0;

  const x = (index) =>
    margin.left + (items.length === 1 ? plotWidth / 2 : (index / (items.length - 1)) * plotWidth);
  const y = (value) =>
    margin.top + plotHeight - ((value - minValue) / (maxValue - minValue)) * plotHeight;

  const svg = createSvgElement("svg", {
    viewBox: `0 0 ${width} ${height}`,
    role: "img",
    "aria-label": "월별 수출액 추이",
  });

  const defs = createSvgElement("defs");
  const gradient = createSvgElement("linearGradient", {
    id: "areaGradient",
    x1: "0",
    y1: "0",
    x2: "0",
    y2: "1",
  });
  gradient.append(
    createSvgElement("stop", { offset: "0%", "stop-color": "#e60023", "stop-opacity": "0.12" }),
    createSvgElement("stop", { offset: "100%", "stop-color": "#e60023", "stop-opacity": "0" })
  );
  defs.append(gradient);
  svg.append(defs);

  for (let i = 0; i <= 4; i += 1) {
    const value = (maxValue / 4) * i;
    const yy = y(value);
    svg.append(
      createSvgElement("line", {
        x1: margin.left,
        x2: width - margin.right,
        y1: yy,
        y2: yy,
        class: "grid-line",
      })
    );
    const label = createSvgElement("text", {
      x: margin.left - 12,
      y: yy + 4,
      "text-anchor": "end",
      class: "axis-label",
    });
    label.textContent = formatCurrencyShort(value).replace("US$ ", "");
    svg.append(label);
  }

  const linePoints = items.map((item, index) => `${x(index)},${y(item.value)}`);
  const linePath = `M ${linePoints.join(" L ")}`;
  const areaPath = `${linePath} L ${x(items.length - 1)},${margin.top + plotHeight} L ${x(0)},${
    margin.top + plotHeight
  } Z`;

  svg.append(createSvgElement("path", { d: areaPath, class: "area-path" }));
  svg.append(createSvgElement("path", { d: linePath, class: "line-path" }));

  items.forEach((item, index) => {
    const dot = createSvgElement("circle", {
      cx: x(index),
      cy: y(item.value),
      r: index % 3 === 0 || index === items.length - 1 ? 5 : 3.5,
      class: "data-dot",
    });
    dot.append(createSvgElement("title"));
    dot.querySelector("title").textContent = `${item.label}: ${formatCurrency(item.value)}`;
    svg.append(dot);

    if (index % 3 === 0 || index === items.length - 1) {
      const label = createSvgElement("text", {
        x: x(index),
        y: height - 18,
        "text-anchor": "middle",
        class: "axis-label",
      });
      label.textContent = item.label.replace("-", ".");
      svg.append(label);
    }
  });

  container.append(svg);
}

function showError(error) {
  document.getElementById("monthlyChart").innerHTML = `
    <div class="error-state">${error.message}</div>
  `;
}

async function init() {
  try {
    const rows = await loadData();
    const data = aggregate(rows);
    renderKpis(data);
    renderBars("portTop5", data.portTop5);
    renderRisks(data.risk);
    renderLineChart(data.monthly);
  } catch (error) {
    showError(error);
    console.error(error);
  }
}

init();

    </script>
  </body>
</html>
